name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-lint-type:
    name: Test, Lint, Type
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Run tests with coverage guardrails
        run: uv run pytest -q --cov --cov-report=term-missing

  integration-smoke:
    name: Integration Smoke
    runs-on: ubuntu-latest
    needs: test-lint-type
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Integration smoke test (3-node cluster)
        run: bash scripts/ci_smoke.sh

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-logs
          path: .ci-smoke-logs
          if-no-files-found: ignore
