apiVersion: v1
kind: Service
metadata:
  name: kvstore-leader
  namespace: kvstore
  labels:
    app: kvstore
spec:
  type: NodePort
  selector:
    app: kvstore
    kvstore-role: leader
  ports:
    - name: rpc
      port: 5003
      targetPort: 5003
      nodePort: 30013
    - name: health
      port: 8080
      targetPort: 8080
      nodePort: 30081
