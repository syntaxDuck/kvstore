apiVersion: v1
kind: ServiceAccount
metadata:
  name: kvstore
  namespace: kvstore

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kvstore-pod-patcher
  namespace: kvstore
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs:
      - get
      - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kvstore-pod-patcher-binding
  namespace: kvstore
subjects:
  - kind: ServiceAccount
    name: kvstore
    namespace: kvstore
roleRef:
  kind: Role
  name: kvstore-pod-patcher
  apiGroup: rbac.authorization.k8s.io
